version: 2

before:
  hooks:
    - go mod tidy
    - bash -c "cd internal/web/frontend && npm install && npm run build"

builds:
  - id: aikit
    main: .
    binary: aikit
    ldflags:
      - -s -w
      - -X github.com/silenceper/aikit/cmd.version={{.Version}}
      - -X github.com/silenceper/aikit/cmd.commit={{.ShortCommit}}
      - -X github.com/silenceper/aikit/cmd.date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

brews:
  - repository:
      owner: silenceper
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/silenceper/aikit"
    description: "Manage AI dev assets. Sync once, align everyone."
    license: "Apache-2.0"
    install: |
      bin.install "aikit"
    test: |
      system "#{bin}/aikit", "version"

release:
  github:
    owner: silenceper
    name: aikit
